version: 1

renderer:
  cluster_name: example-cluster
  public_domain: example.net
  adapters:
    - traefik-public
    - gatus

services:
  api-service:
    description: Renderable API service using route and probe fields.
    workload:
      kind: deployment
      replicas: 2
      restart_policy: Always
    image:
      repository: registry.example.net/team/api-service
      tag: latest
      pull_policy: Always
      source: first_party
    ports:
      - name: http
        container_port: 8080
        service_port: 80
        exposure: public
    networking:
      routes:
        - name: api-service
          host: api.example.net
          port: http
          paths:
            - /api/
          access: direct
          origin: public-proxied
    gatus:
      endpoints:
        - name: api-health
          type: http
          port: http
          path: /api/health
          expected_status: 200
          strategy: both
          group: apps
    kubernetes:
      namespace_ref: app-system
      service_ref: api-service
      render_status: candidate
      resource_hints:
        - Deployment
        - Service
