version: 1
name: example-platform
domain: example.net

cluster:
  kind: k3s
  api: https://203.0.113.10:6443
  bootstrap: edge-1

gitops:
  root: platform/cluster/flux
  environment: production
  interval: 2m

packs:
  core:
    - cert-manager
    - external-dns
    - traefik-public

hosts:
  edge-1:
    site: primary
    system: x86_64-linux
    roles:
      - base
      - k3s-control-plane
      - k3s-worker
    capabilities:
      - public-ingress
    ssh: deploy@203.0.113.10:2222
    hostModule: platform/nix/hosts/edge-1/default.nix

services:
  api:
    namespace: app-system
    image: ghcr.io/example/api:1.0.0
    port: 8080
    route:
      host: root
      path: /
      sso: false
      origin: edge_direct
    health: /healthz
